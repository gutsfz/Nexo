name: nexo
description: "Nexo — Conecte seus hábitos, construa seu futuro."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  sqflite_common_ffi: ^2.3.0
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^17.3.0

  # HTTP
  dio: ^5.4.3+1

  # Local storage
  shared_preferences: ^2.2.3
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Code generation
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # UI
  google_fonts: ^8.1.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: ^2.4.8
  freezed: ^3.2.5
  json_serializable: ^6.7.1
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.3
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true